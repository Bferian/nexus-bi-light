<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus BI Light — Análise Empresarial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c0f;--surface:#111318;--surface2:#181c23;--border:#1e2330;--border2:#2a3040;--text:#e8eaf0;--muted:#6b7280;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'DM Serif Display',serif;line-height:1.2}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* Header */
.header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,12,15,0.95);backdrop-filter:blur(12px);z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-family:'DM Serif Display',serif;font-size:19px}
.logo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.light-tag{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.25);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.5px}
.hist-badge{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:12px;color:var(--muted);cursor:pointer}
.hist-badge span{color:var(--accent);font-weight:600}

/* Layout */
.main{max-width:820px;margin:0 auto;padding:32px 18px 80px}

/* Setup */
.setup{max-width:500px;margin:44px auto 0;text-align:center}
.setup-title{font-size:34px;margin-bottom:10px;background:linear-gradient(135deg,var(--text) 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.setup-sub{color:var(--muted);font-size:14px;margin-bottom:30px;font-weight:300}
.card-form{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;text-align:left}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
.field{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.inp{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}.inp::placeholder{color:var(--muted)}
.inp.mono{font-family:'DM Mono',monospace;font-size:13px}
.sel{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;appearance:none;cursor:pointer;transition:border-color .2s}
.sel:focus{border-color:var(--accent)}
.upload-area{border:1.5px dashed var(--border2);border-radius:11px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);margin-bottom:14px}
.upload-area:hover,.upload-area.over{border-color:var(--accent);background:rgba(79,142,247,.04)}
.upload-area.ok{border-color:var(--green);background:rgba(34,197,94,.04)}
.upload-icon{font-size:24px;margin-bottom:5px}
.upload-txt{color:var(--muted);font-size:13px}.upload-txt strong{color:var(--accent)}
.divider{height:1px;background:var(--border);margin:16px 0}
.btn-main{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .18s}
.btn-main:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}.btn-main:disabled{opacity:.38;cursor:not-allowed}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .18s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:9px;padding:12px 16px;color:var(--red);font-size:13px;margin-bottom:14px}
.hint{text-align:center;margin-top:9px;font-size:12px;color:var(--muted)}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px}
.ring{width:46px;height:46px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .85s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.steps{display:flex;flex-direction:column;gap:7px}
.step{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);opacity:0;animation:fin .35s forwards}
.step.on{color:var(--text)}.step .dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}.step.on .dot{background:var(--accent)}
@keyframes fin{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}

/* Dashboard */
.dash{display:flex;flex-direction:column;gap:20px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.toolbar h2{font-size:21px}.toolbar p{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

/* Score compact */
.score-bar-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 26px}
.score-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.score-left h3{font-size:16px;margin-bottom:3px}
.score-co{font-size:12px;color:var(--accent);font-weight:500}
.score-period{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.score-right{display:flex;align-items:center;gap:10px}
.score-num{font-family:'DM Serif Display',serif;font-size:38px;line-height:1}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500}
.p-ok{background:rgba(34,197,94,.12);color:var(--green)}.p-warn{background:rgba(245,158,11,.12);color:var(--yellow)}.p-crit{background:rgba(239,68,68,.12);color:var(--red)}
.trend-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600;background:var(--surface2);border:1px solid var(--border2)}
/* Progress bar score */
.score-track{height:8px;background:var(--border2);border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.22,.68,0,1.2)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-hd{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.card-ico{font-size:15px;width:32px;height:32px;background:var(--surface2);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-ttl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
p.body{font-size:13px;line-height:1.75}

/* Metrics chips */
.metrics{display:flex;gap:10px;flex-wrap:wrap}
.mc{flex:1;min-width:110px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px 13px}
.mc-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.mc-val{font-family:'DM Serif Display',serif;font-size:20px}
.mc-delta{font-size:10px;margin-top:2px;font-family:'DM Mono',monospace}
.d-up{color:var(--green)}.d-dn{color:var(--red)}.d-fl{color:var(--muted)}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.charts-grid{grid-template-columns:1fr}}
canvas{width:100%!important}

/* Insights */
.ilist{display:flex;flex-direction:column;gap:11px}
.ii{display:flex;gap:10px;align-items:flex-start}
.inum{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);background:rgba(79,142,247,.1);width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.itxt{font-size:13px;line-height:1.6}

/* Toast */
.toast{position:fixed;bottom:22px;right:18px;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:10px 16px;font-size:13px;z-index:999;animation:tup .3s ease}
@keyframes tup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{opacity:0;animation:fadein .5s ease forwards}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.16s}.d4{animation-delay:.22s}.d5{animation-delay:.28s}
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-icon">◈</div>
    <div><div class="logo-text">Nexus BI <span style="font-size:14px;opacity:.6">Light</span></div><div class="logo-sub">Análise Empresarial</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="light-tag">LIGHT</div>
    <div id="hist-btn" style="display:none">
      <div class="hist-badge" onclick="clearHistory()"><span id="hist-count">0</span> períodos · limpar</div>
    </div>
  </div>
</header>

<main class="main">
  <!-- SETUP -->
  <div id="screen-setup" class="setup">
    <h1 class="setup-title">Análise<br/>Empresarial</h1>
    <p class="setup-sub">Envie sua planilha e receba análise, gráficos e insights em segundos.</p>
    <div class="card-form">
      <div id="err-box" class="err" style="display:none"></div>

      <div class="field">
        <label class="lbl">Chave de API do Claude</label>
        <input type="password" class="inp mono" id="api-key" placeholder="sk-ant-..."/>
      </div>

      <div class="row2">
        <div class="field">
          <label class="lbl">Nome da Empresa</label>
          <input type="text" class="inp" id="company-name" placeholder="Ex: Loja da Maria"/>
        </div>
        <div class="field">
          <label class="lbl">Setor</label>
          <select class="sel" id="sector">
            <option value="">Selecione...</option>
            <option value="Varejo">Varejo</option>
            <option value="Alimentação e Restaurantes">Alimentação / Restaurantes</option>
            <option value="Indústria e Manufatura">Indústria / Manufatura</option>
            <option value="Serviços Profissionais">Serviços Profissionais</option>
            <option value="Tecnologia e Software">Tecnologia / Software</option>
            <option value="Saúde e Clínicas">Saúde / Clínicas</option>
            <option value="Construção Civil">Construção Civil</option>
            <option value="Agronegócio">Agronegócio</option>
            <option value="Educação">Educação</option>
            <option value="Logística e Transportes">Logística / Transportes</option>
            <option value="E-commerce">E-commerce</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="lbl">Planilha de Dados</label>
        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-inp').click()">
          <div class="upload-icon" id="upload-icon">📂</div>
          <div class="upload-txt" id="upload-txt"><strong>Clique para selecionar</strong> ou arraste<br/><span style="font-size:11px">CSV ou Excel (.xlsx)</span></div>
        </div>
        <input type="file" id="file-inp" accept=".csv,.xlsx,.xls,.tsv,.txt" style="display:none"/>
      </div>

      <div class="divider"></div>
      <button class="btn-main" id="btn-analyze" onclick="startAnalysis()">✦ Gerar Análise</button>
      <p class="hint" id="hist-hint" style="display:none"></p>
    </div>
  </div>

  <!-- LOADING -->
  <div id="screen-loading" class="loading" style="display:none">
    <div class="ring"></div>
    <div>
      <div id="loading-co" style="text-align:center;margin-bottom:5px;font-size:15px;font-family:'DM Serif Display',serif"></div>
      <div style="text-align:center;margin-bottom:16px;color:var(--muted);font-size:13px">Analisando dados...</div>
      <div class="steps" id="steps-list"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="screen-dash" style="display:none">
    <div class="toolbar fade d1">
      <div><h2 id="dash-title">Análise</h2><p id="dash-period"></p></div>
      <button class="btn-ghost" onclick="resetToSetup()">+ Nova Análise</button>
    </div>
    <div class="dash" id="dash-content"></div>
  </div>
</main>

<div id="toast" class="toast" style="display:none"></div>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────
let selectedFile=null, fileText='', history=[], chartInstances=[];
try{history=JSON.parse(localStorage.getItem('nxbi_light_history')||'[]');}catch{}

const STEPS=['Lendo a planilha...','Calculando métricas...','Gerando gráficos...','Formulando insights...'];

const SYS=`Você é um analista de negócios. Analise os dados e retorne APENAS JSON válido (sem markdown) com esta estrutura:
{
  "periodo": "string",
  "score": número 0-100,
  "tendencia": "melhora"|"estavel"|"piora",
  "status": "saudavel"|"atencao"|"critico",
  "resumo": "2-3 linhas diretas sobre a situação da empresa",
  "metricas": [{"nome":"string","valor":"string","delta":"ex: +12%","direcao":"up"|"down"|"flat"}],
  "grafico_barras": {
    "titulo": "string",
    "labels": ["string"],
    "datasets": [{"label":"string","valores":[número]}]
  },
  "grafico_linha": {
    "titulo": "string",
    "labels": ["string"],
    "datasets": [{"label":"string","valores":[número]}]
  },
  "insights": ["string com insight direto e acionável"]
}`;

// ── File ──────────────────────────────────────────────────────────────────
document.getElementById('file-inp').addEventListener('change',e=>{const f=e.target.files[0];if(f)handleFile(f);});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)handleFile(f);});

async function handleFile(f){
  selectedFile=f;
  const ext=f.name.split('.').pop().toLowerCase();
  try{
    if(ext==='xlsx'||ext==='xls'){fileText=await readExcel(f);}
    else{fileText=await readText(f);}
    dz.classList.add('ok');
    document.getElementById('upload-icon').textContent='✅';
    document.getElementById('upload-txt').innerHTML=`<strong>${f.name}</strong><br/><span style="font-size:11px">${(f.size/1024).toFixed(1)} KB</span>`;
  }catch(e){showErr('Erro ao ler arquivo: '+e.message);}
}
function readText(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error('Falha'));r.readAsText(f,'UTF-8');});}
function readExcel(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'binary'});let csv='';wb.SheetNames.forEach(n=>{csv+=`[${n}]\n`+XLSX.utils.sheet_to_csv(wb.Sheets[n])+'\n\n';});res(csv);}catch(err){rej(err);}};r.onerror=()=>rej(new Error('Falha Excel'));r.readAsBinaryString(f);});}

// ── UI ────────────────────────────────────────────────────────────────────
function show(id){document.getElementById(id).style.display='';}
function hide(id){document.getElementById(id).style.display='none';}
function showErr(m){const b=document.getElementById('err-box');b.textContent='⚠ '+m;b.style.display='';}
function hideErr(){document.getElementById('err-box').style.display='none';}
function showToast(m){const t=document.getElementById('toast');t.textContent='✓ '+m;t.style.display='';setTimeout(()=>t.style.display='none',3000);}
function saveHistory(){localStorage.setItem('nxbi_light_history',JSON.stringify(history));}
function clearHistory(){history=[];saveHistory();updateBadge();showToast('Histórico limpo.');}
function updateBadge(){
  if(history.length>0){show('hist-btn');document.getElementById('hist-count').textContent=history.length;document.getElementById('hist-hint').style.display='';document.getElementById('hist-hint').textContent=history.length+' análise'+(history.length>1?'s':'')+' anteriores salvas';document.getElementById('btn-analyze').textContent='✦ Analisar';}
  else{hide('hist-btn');hide('hist-hint');document.getElementById('btn-analyze').textContent='✦ Gerar Análise';}
}

// ── API ───────────────────────────────────────────────────────────────────
async function callAPI(apiKey,csv,co,sec){
  const hCtx=history.length>0?'\nHISTÓRICO:\n'+history.map((h,i)=>`P${i+1}: ${h.periodo} score:${h.score} ${h.status}`).join('\n'):'\nPrimeira análise.';
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,system:SYS,
      messages:[{role:'user',content:`Empresa: ${co}\nSetor: ${sec}\n\nPlanilha:\n${csv.slice(0,8000)}${hCtx}\n\nRetorne APENAS o JSON.`}]})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||'Erro HTTP '+res.status);}
  const d=await res.json();
  return JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
}

// ── Flow ──────────────────────────────────────────────────────────────────
async function startAnalysis(){
  hideErr();
  const apiKey=document.getElementById('api-key').value.trim();
  const co=document.getElementById('company-name').value.trim();
  const sec=document.getElementById('sector').value;
  if(!apiKey){showErr('Insira sua chave de API.');return;}
  if(!co){showErr('Informe o nome da empresa.');return;}
  if(!sec){showErr('Selecione o setor.');return;}
  if(!selectedFile){showErr('Selecione uma planilha.');return;}
  hide('screen-setup');show('screen-loading');
  document.getElementById('loading-co').textContent=co;
  const sl=document.getElementById('steps-list');
  sl.innerHTML=STEPS.map((s,i)=>`<div class="step" id="st${i}" style="animation-delay:${i*.3}s"><div class="dot"></div>${s}</div>`).join('');
  let si=0;const t=setInterval(()=>{document.getElementById('st'+si)?.classList.add('on');si++;if(si>=STEPS.length)clearInterval(t);},1200);
  try{
    const r=await callAPI(apiKey,fileText,co,sec);
    r._co=co;r._sec=sec;
    clearInterval(t);history=[...history,r].slice(-6);saveHistory();
    renderDash(r);showToast('Análise concluída!');
  }catch(e){clearInterval(t);hide('screen-loading');show('screen-setup');showErr(e.message||'Erro na análise.');}
}

function resetToSetup(){
  // Destroy charts
  chartInstances.forEach(c=>c.destroy());chartInstances=[];
  hide('screen-dash');hide('screen-loading');
  selectedFile=null;fileText='';dz.classList.remove('ok');
  document.getElementById('upload-icon').textContent='📂';
  document.getElementById('upload-txt').innerHTML='<strong>Clique para selecionar</strong> ou arraste<br/><span style="font-size:11px">CSV ou Excel (.xlsx)</span>';
  hideErr();show('screen-setup');updateBadge();
}

// ── Render ────────────────────────────────────────────────────────────────
function sc(s){return s>=70?'var(--green)':s>=45?'var(--yellow)':'var(--red)';}
function pc(s){return s>=70?'p-ok':s>=45?'p-warn':'p-crit';}
function pl(s){return s>=70?'✓ Saudável':s>=45?'⚠ Atenção':'✕ Crítico';}
function ti(t){return t==='melhora'?'↑':t==='piora'?'↓':'→';}
function tc(t){return t==='melhora'?'var(--green)':t==='piora'?'var(--red)':'var(--muted)';}
function tl(t){return t==='melhora'?'Melhora':t==='piora'?'Em queda':'Estável';}
function dc(d){return d==='up'?'d-up':d==='down'?'d-dn':'d-fl';}
function di(d){return d==='up'?'▲':d==='down'?'▼':'─';}

const CHART_COLORS=['#4f8ef7','#22c55e','#f59e0b','#7c5cfc','#ef4444','#06b6d4'];

function buildBarChart(canvasId, data){
  const ctx=document.getElementById(canvasId).getContext('2d');
  const ch=new Chart(ctx,{
    type:'bar',
    data:{
      labels:data.labels,
      datasets:data.datasets.map((ds,i)=>({
        label:ds.label,
        data:ds.valores,
        backgroundColor:CHART_COLORS[i%CHART_COLORS.length]+'99',
        borderColor:CHART_COLORS[i%CHART_COLORS.length],
        borderWidth:1.5,
        borderRadius:5,
      }))
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{labels:{color:'#6b7280',font:{family:"'DM Sans'",size:11}}},title:{display:true,text:data.titulo,color:'#9ca3af',font:{family:"'DM Sans'",size:11,weight:'600'}}},
      scales:{x:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1e2330'}},y:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1e2330'}}}
    }
  });
  chartInstances.push(ch);
}

function buildLineChart(canvasId, data){
  const ctx=document.getElementById(canvasId).getContext('2d');
  const ch=new Chart(ctx,{
    type:'line',
    data:{
      labels:data.labels,
      datasets:data.datasets.map((ds,i)=>({
        label:ds.label,
        data:ds.valores,
        borderColor:CHART_COLORS[i%CHART_COLORS.length],
        backgroundColor:CHART_COLORS[i%CHART_COLORS.length]+'22',
        borderWidth:2,
        pointBackgroundColor:CHART_COLORS[i%CHART_COLORS.length],
        pointRadius:4,
        tension:.35,
        fill:true,
      }))
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{labels:{color:'#6b7280',font:{family:"'DM Sans'",size:11}}},title:{display:true,text:data.titulo,color:'#9ca3af',font:{family:"'DM Sans'",size:11,weight:'600'}}},
      scales:{x:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1e2330'}},y:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1e2330'}}}
    }
  });
  chartInstances.push(ch);
}

function renderDash(s){
  hide('screen-loading');
  const co=s._co,sec=s._sec,trend=s.tendencia||'estavel';
  document.getElementById('dash-title').textContent='Análise — '+co;
  document.getElementById('dash-period').textContent='Período: '+s.periodo+' · '+sec;

  const metricsHTML=(s.metricas||[]).map(m=>`
    <div class="mc">
      <div class="mc-name">${m.nome}</div>
      <div class="mc-val">${m.valor}</div>
      <div class="mc-delta ${dc(m.direcao)}">${di(m.direcao)} ${m.delta}</div>
    </div>`).join('');

  const insightsHTML=(s.insights||[]).map((ins,i)=>`
    <div class="ii">
      <div class="inum">${i+1}</div>
      <p class="itxt">${ins}</p>
    </div>`).join('');

  document.getElementById('dash-content').innerHTML=`
  <!-- Score bar -->
  <div class="score-bar-card fade d2">
    <div class="score-top">
      <div class="score-left">
        <h3>Saúde do Negócio</h3>
        <div class="score-co">${co} · ${sec}</div>
        <div class="score-period">${s.periodo}</div>
      </div>
      <div class="score-right">
        <div class="score-num" style="color:${sc(s.score)}">${s.score}</div>
        <div>
          <span class="pill ${pc(s.score)}" style="display:block;margin-bottom:5px">${pl(s.score)}</span>
          <span class="trend-pill" style="color:${tc(trend)}">${ti(trend)} ${tl(trend)}</span>
        </div>
      </div>
    </div>
    <div class="score-track">
      <div class="score-fill" style="width:${s.score}%;background:${sc(s.score)}"></div>
    </div>
  </div>

  <!-- Resumo -->
  <div class="card fade d2">
    <div class="card-hd"><div class="card-ico">📋</div><div class="card-ttl">Resumo da Análise</div></div>
    <p class="body">${s.resumo}</p>
  </div>

  <!-- Métricas -->
  ${metricsHTML?`<div class="card fade d3">
    <div class="card-hd"><div class="card-ico">📊</div><div class="card-ttl">Métricas Principais</div></div>
    <div class="metrics">${metricsHTML}</div>
  </div>`:''}

  <!-- Gráficos -->
  <div class="charts-grid fade d3">
    <div class="card">
      <canvas id="chart-bar" height="200"></canvas>
    </div>
    <div class="card">
      <canvas id="chart-line" height="200"></canvas>
    </div>
  </div>

  <!-- Insights -->
  <div class="card fade d4">
    <div class="card-hd"><div class="card-ico">💡</div><div class="card-ttl">Insights</div></div>
    <div class="ilist">${insightsHTML}</div>
  </div>`;

  show('screen-dash');updateBadge();

  // Build charts after DOM is ready
  setTimeout(()=>{
    if(s.grafico_barras) buildBarChart('chart-bar', s.grafico_barras);
    if(s.grafico_linha)  buildLineChart('chart-line', s.grafico_linha);
  }, 80);
}

// ── Init ──────────────────────────────────────────────────────────────────
updateBadge();
Chart.defaults.color='#6b7280';
Chart.defaults.borderColor='#1e2330';
const sk=localStorage.getItem('nxbi_light_key');if(sk)document.getElementById('api-key').value=sk;
document.getElementById('api-key').addEventListener('input',e=>localStorage.setItem('nxbi_light_key',e.target.value));
const sn=localStorage.getItem('nxbi_light_co');if(sn)document.getElementById('company-name').value=sn;
document.getElementById('company-name').addEventListener('input',e=>localStorage.setItem('nxbi_light_co',e.target.value));
const ss=localStorage.getItem('nxbi_light_sec');if(ss)document.getElementById('sector').value=ss;
document.getElementById('sector').addEventListener('change',e=>localStorage.setItem('nxbi_light_sec',e.target.value));
</script>
</body>
